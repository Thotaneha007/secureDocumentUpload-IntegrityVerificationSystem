<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container" style="width: 95%; max-width: 1000px; margin-top: 50px; padding: 40px;">
    <div class="header-actions">
        <h2>Admin Dashboard - All Uploaded Documents</h2>
        <a href="/logout">Logout</a>
    </div>

    {% if documents %}
    <div style="overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #eee;">
    <table>
        <thead>
            <tr>
                <th>Document ID</th>
                <th>File Name</th>
                <th>Uploaded By</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for doc in documents %}
            <tr>
                <td>{{ doc[0] }}</td>
                <td>{{ doc[1] }}</td>
                <td>{{ doc[2] }}</td>
                <td>
                    <form action="/admin/delete" method="post" style="margin: 0;" onsubmit="return confirm('Are you sure you want to permanently delete this file?');">
                        <input type="hidden" name="doc_id" value="{{ doc[0] }}">
                        <button type="submit" style="background-color: #dc3545; padding: 5px 10px; font-size: 0.9em; width: auto;">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>
    {% else %}
    <p>No documents found in the system.</p>
    {% endif %}

    <br><br>
    <a href="/upload">Go to Upload Panel</a>
</div>

</body>
</html>
