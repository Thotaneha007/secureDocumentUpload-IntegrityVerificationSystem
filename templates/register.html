<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form method="post">
        <input type="text" name="username" placeholder="Username" autocomplete="off" required>
        <input type="password" name="password" placeholder="Password" required>
        <select name="role" required style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px;">
            <option value="user">User (Upload & Verify own files)</option>
            <option value="auditor">Auditor (Verify all files in system)</option>
            <option value="admin">Admin (Manage & Delete all files)</option>
        </select>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Login</a>
</div>

</body>
</html>
