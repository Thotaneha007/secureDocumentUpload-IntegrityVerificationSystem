<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <form method="post">
        <input type="text" name="username" placeholder="Username" autocomplete="off" required>
        <input type="password" name="password" placeholder="Password" required>
        
        <div style="margin-top: 15px; margin-bottom: 5px; text-align: left;">
            <label style="font-weight: bold; color: #333;">Authenticator Code:</label>
            <p style="font-size: 0.85em; color: #666; margin: 5px 0 10px 0;">Look at the Authenticator app on your phone (Google Auth, Microsoft Auth, etc.) to get this 6-digit code.</p>
        </div>
        <input type="text" name="mfa_token" placeholder="Enter 6-digit Authenticator Code" autocomplete="off" style="letter-spacing: 2px; font-weight: bold; text-align: center;">
        
        <button type="submit" style="margin-top: 15px;">Login securely</button>
    </form>

    <a href="/register">Don’t have an account? Register</a>
</div>

</body>
</html>
